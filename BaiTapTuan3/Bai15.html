<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form action="" ,method="post">
        <h1>Contact Us</h1>
        <fieldset>
            <legend>Your message:</legend>
        <p>To
            <input type="to" name="txt" value="Example Cafe" size="20"  maxlength="20" ></p>
        </p>
        <p>Your email: 
            <input type="email" name="txtEmail" value="" size="20" maxlength="20"></p>
        <p>Message: 
            <textarea id="message" name="message" rows="10" cols="50"></textarea>

        </fieldset>

        <fieldset>
            <legend>How you found us:</legend>
            <p>How did you hear of us ? 
                <select name="Seach" size="1"  >
                    <option value="Google">Google </option>
                    </select></p>
            <p>Newsletter
                <input type="checkbox" id="" name="" value="" checked />
                <label for="">Ensure this box is checked if you would like to receive email updates</label></p>

        </fieldset>

        <fieldset>
            <legend><i>Contact Information</i></legend>
            <label>How tall is the Eiffel Tower in Paris, France ?</label><br>
            <input type="checkbox" name="584ft" id="584ft" value="">
                <label for="584ft">584ft</label><br>
                <input type="checkbox" name="784ft" id="784ft" value="">
                <label for="784ft">784ft</label><br>
                <input type="checkbox" name="984ft" id="984ft" value="">
                <label for="984ft">984ft</label><br>
                <input type="checkbox" name="1184ft" id="1184ft" value="">
                <label for="784ft">1184ft</label>
        </fieldset>


        <fieldset>
            <legend><i>Competition Question</i></legend>
            <label>In 25 words or less, say why you would like to win $10,000:</label>
            <textarea id="Question" name="Question" rows="10" cols="50"></textarea>
        </fieldset>

        <fieldset>
            <legend><i>Enter competition</i></legend>
            <p><input type="submit" value="Send message" ></p>
        </fieldset>
    </form>
</body>
</html>
